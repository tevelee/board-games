<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Gomoku — 5 in a Row</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --blue: #58a6ff;
      --red: #f85149;
      --green: #3fb950;
      --gold: #e3b341;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo .accent { color: var(--blue); }
    #status {
      font-size: 0.8rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #status.player { border-color: var(--blue);  color: var(--blue);  }
    #status.ai     { border-color: var(--muted); color: var(--muted); }
    #status.win    { border-color: var(--green); color: var(--green); background: #0a2414; }
    #status.lose   { border-color: var(--red);   color: var(--red);   background: #1a0707; }
    .gap { flex: 1; }
    .score {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #21262d;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot.you { background: var(--blue); }
    .dot.ai  { background: var(--red); }
    .score-val { font-weight: 700; color: var(--text); min-width: 14px; text-align: center; }
    .controls { display: flex; gap: 6px; align-items: center; }
    select, button {
      background: #21262d;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    select:hover { border-color: var(--blue); }
    button { background: #1a4a28; border-color: #2ea043; font-weight: 600; }
    button:hover { background: #2ea043; border-color: #3fb950; }
    #board-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      position: absolute;
      inset: 0;
      cursor: crosshair;
      display: block;
    }
    canvas.panning { cursor: grabbing; }
    #hint {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: #484f58;
      pointer-events: none;
      line-height: 1.6;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">∞ <span class="accent">Gomoku</span></div>
    <div id="status" class="player">Your turn</div>
    <div class="gap"></div>
    <div class="score">
      <div class="score-item">
        <div class="dot you"></div>
        <span class="score-val" id="s-you">0</span>
      </div>
      <span style="color:#484f58">:</span>
      <div class="score-item">
        <div class="dot ai"></div>
        <span class="score-val" id="s-ai">0</span>
      </div>
    </div>
    <div class="controls">
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
        <option value="expert">Expert</option>
      </select>
      <button id="btn-new">New Game</button>
    </div>
  </header>
  <div id="board-container">
    <canvas id="canvas"></canvas>
    <div id="hint">Drag to pan · Click to place<br>5 in a row to win</div>
  </div>

<script>
(() => {
  'use strict';

  // ── Constants ──────────────────────────────────────────────────────────────
  const CELL = 40;
  const HUMAN = 1;
  const BOT   = 2;
  const DIRS  = [[1,0],[0,1],[1,1],[1,-1]];

  // ── Game state ─────────────────────────────────────────────────────────────
  let board    = new Map();   // "x,y" → 1|2
  let current  = HUMAN;
  let winner   = null;
  let winLine  = null;
  let lastMove = null;
  let scores   = { you: 0, ai: 0 };
  let busy     = false;       // true while AI is computing

  function reset() {
    board.clear();
    current  = HUMAN;
    winner   = null;
    winLine  = null;
    lastMove = null;
    busy     = false;
  }

  function place(x, y) {
    const key = `${x},${y}`;
    if (board.has(key) || winner) return false;
    board.set(key, current);
    lastMove = { x, y };
    const line = detectWin(x, y);
    if (line) {
      winner  = current;
      winLine = line;
      if (winner === HUMAN) scores.you++;
      else scores.ai++;
      renderScores();
    } else {
      current = current === HUMAN ? BOT : HUMAN;
    }
    return true;
  }

  // Returns winning line of ≥5 cells or null
  function detectWin(x, y) {
    const p = board.get(`${x},${y}`);
    for (const [dx, dy] of DIRS) {
      const line = [{ x, y }];
      for (let s = 1; s < 9; s++) {
        if (board.get(`${x+dx*s},${y+dy*s}`) === p) line.push({ x:x+dx*s, y:y+dy*s });
        else break;
      }
      for (let s = 1; s < 9; s++) {
        if (board.get(`${x-dx*s},${y-dy*s}`) === p) line.push({ x:x-dx*s, y:y-dy*s });
        else break;
      }
      if (line.length >= 5) return line;
    }
    return null;
  }

  // Quick win test without returning the full line (used in AI lookahead)
  function isWinAt(x, y) {
    const p = board.get(`${x},${y}`);
    if (!p) return false;
    for (const [dx, dy] of DIRS) {
      let n = 1;
      for (let s = 1; s < 5; s++) { if (board.get(`${x+dx*s},${y+dy*s}`) === p) n++; else break; }
      for (let s = 1; s < 5; s++) { if (board.get(`${x-dx*s},${y-dy*s}`) === p) n++; else break; }
      if (n >= 5) return true;
    }
    return false;
  }

  // ── AI ─────────────────────────────────────────────────────────────────────

  // Cells adjacent to existing pieces (candidates for next move)
  function getCandidates(range = 2) {
    if (board.size === 0) return [{ x: 0, y: 0 }];
    const seen = new Set(board.keys());
    const out  = [];
    for (const key of board.keys()) {
      const [x, y] = key.split(',').map(Number);
      for (let dx = -range; dx <= range; dx++) {
        for (let dy = -range; dy <= range; dy++) {
          const nk = `${x+dx},${y+dy}`;
          if (!seen.has(nk)) { seen.add(nk); out.push({ x: x+dx, y: y+dy }); }
        }
      }
    }
    return out;
  }

  // Score a 5-cell window for one player
  function windowScore(w, player) {
    const opp  = player === BOT ? HUMAN : BOT;
    const mine  = w.filter(c => c === player).length;
    const theirs = w.filter(c => c === opp).length;
    if (theirs > 0 || mine === 0) return 0;
    return [0, 1, 10, 100, 1000, 100000][mine];
  }

  // Score all windows of 5 through (x,y) in all directions, for one player
  // The piece at (x,y) must be set in `board` before calling
  function localScore(x, y, player) {
    let total = 0;
    for (const [dx, dy] of DIRS) {
      const cells = [];
      for (let i = -4; i <= 4; i++)
        cells.push(board.get(`${x+dx*i},${y+dy*i}`) || 0);
      for (let i = 0; i <= 4; i++)
        total += windowScore(cells.slice(i, i+5), player);
    }
    return total;
  }

  // Heuristic score of placing player at (x,y)
  function moveScore(x, y, player) {
    const key = `${x},${y}`;
    board.set(key, player);
    const s = localScore(x, y, player);
    board.delete(key);
    return s;
  }

  // Board evaluation for minimax (positive = good for BOT)
  function evalBoard() {
    let score = 0;
    for (const [key] of board) {
      const [x, y] = key.split(',').map(Number);
      for (const [dx, dy] of DIRS) {
        const cells = [];
        for (let i = -4; i <= 4; i++)
          cells.push(board.get(`${x+dx*i},${y+dy*i}`) || 0);
        for (let i = 0; i <= 4; i++) {
          score += windowScore(cells.slice(i, i+5), BOT);
          score -= windowScore(cells.slice(i, i+5), HUMAN) * 1.1;
        }
      }
    }
    return score;
  }

  function minimax(depth, alpha, beta, isMax) {
    const s = evalBoard();
    if (Math.abs(s) > 50000 || depth === 0) return s;

    const cands = getCandidates(2)
      .map(p => ({ ...p, w: moveScore(p.x, p.y, BOT) + moveScore(p.x, p.y, HUMAN) }))
      .sort((a, b) => b.w - a.w)
      .slice(0, 12);

    if (!cands.length) return s;

    if (isMax) {
      let best = -Infinity;
      for (const { x, y } of cands) {
        board.set(`${x},${y}`, BOT);
        best = Math.max(best, minimax(depth - 1, alpha, beta, false));
        board.delete(`${x},${y}`);
        alpha = Math.max(alpha, best);
        if (beta <= alpha) break;
      }
      return best;
    } else {
      let best = Infinity;
      for (const { x, y } of cands) {
        board.set(`${x},${y}`, HUMAN);
        best = Math.min(best, minimax(depth - 1, alpha, beta, true));
        board.delete(`${x},${y}`);
        beta = Math.min(beta, best);
        if (beta <= alpha) break;
      }
      return best;
    }
  }

  function computeAIMove() {
    const diff = document.getElementById('difficulty').value;
    if (board.size === 0) return { x: 0, y: 0 };

    const cands = getCandidates(2);

    // Always take an immediate win
    for (const { x, y } of cands) {
      board.set(`${x},${y}`, BOT);
      const w = isWinAt(x, y);
      board.delete(`${x},${y}`);
      if (w) return { x, y };
    }

    // Easy: mostly random, occasionally blocks
    if (diff === 'easy') {
      if (Math.random() < 0.65) return cands[Math.floor(Math.random() * cands.length)];
      for (const { x, y } of cands) {
        board.set(`${x},${y}`, HUMAN);
        const w = isWinAt(x, y);
        board.delete(`${x},${y}`);
        if (w) return { x, y };
      }
      return cands[Math.floor(Math.random() * cands.length)];
    }

    // Always block opponent's immediate win
    for (const { x, y } of cands) {
      board.set(`${x},${y}`, HUMAN);
      const w = isWinAt(x, y);
      board.delete(`${x},${y}`);
      if (w) return { x, y };
    }

    // Medium: pure heuristic scoring
    if (diff === 'medium') {
      return heuristicBest(cands);
    }

    // Hard / Expert: minimax with alpha-beta
    const depth = diff === 'hard' ? 3 : 5;
    const top = cands
      .map(p => ({ ...p, w: moveScore(p.x, p.y, BOT) + moveScore(p.x, p.y, HUMAN) }))
      .sort((a, b) => b.w - a.w)
      .slice(0, 15);

    let bestScore = -Infinity;
    let bestMove  = top[0];
    for (const { x, y } of top) {
      board.set(`${x},${y}`, BOT);
      const sc = minimax(depth - 1, -Infinity, Infinity, false);
      board.delete(`${x},${y}`);
      if (sc > bestScore) { bestScore = sc; bestMove = { x, y }; }
    }
    return bestMove;
  }

  function heuristicBest(cands) {
    let best = cands[0], bestS = -Infinity;
    for (const p of cands) {
      const s = moveScore(p.x, p.y, BOT) + moveScore(p.x, p.y, HUMAN) * 1.1;
      if (s > bestS) { bestS = s; best = p; }
    }
    return best;
  }

  // ── Renderer ───────────────────────────────────────────────────────────────
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const container = document.getElementById('board-container');
  let W = 0, H = 0, dpr = 1;
  const offset = { x: 0, y: 0 };
  let hover = null;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W   = container.clientWidth;
    H   = container.clientHeight;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function g2p(gx, gy) {
    return { x: gx * CELL + offset.x + W / 2, y: gy * CELL + offset.y + H / 2 };
  }

  function p2g(px, py) {
    return {
      x: Math.round((px - W / 2 - offset.x) / CELL),
      y: Math.round((py - H / 2 - offset.y) / CELL),
    };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth   = 0.5;
    const ox = ((offset.x + W / 2) % CELL + CELL) % CELL;
    const oy = ((offset.y + H / 2) % CELL + CELL) % CELL;
    ctx.beginPath();
    for (let x = ox - CELL; x <= W + CELL; x += CELL) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = oy - CELL; y <= H + CELL; y += CELL) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    // Center marker
    const cp = g2p(0, 0);
    if (cp.x > -8 && cp.x < W + 8 && cp.y > -8 && cp.y < H + 8) {
      ctx.fillStyle = '#444c56';
      ctx.beginPath();
      ctx.arc(cp.x, cp.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Hover preview
    if (hover && current === HUMAN && !winner && !busy) {
      const key = `${hover.x},${hover.y}`;
      if (!board.has(key)) {
        const { x, y } = g2p(hover.x, hover.y);
        const r = CELL / 2 - 5;
        ctx.fillStyle   = 'rgba(88,166,255,0.12)';
        ctx.strokeStyle = 'rgba(88,166,255,0.35)';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    // Pieces
    for (const [key, p] of board) {
      const [gx, gy] = key.split(',').map(Number);
      const { x, y } = g2p(gx, gy);
      const r     = CELL / 2 - 5;
      const color = p === HUMAN ? '#58a6ff' : '#f85149';
      const isLast = lastMove && lastMove.x === gx && lastMove.y === gy;

      // Glow
      ctx.shadowColor = color;
      ctx.shadowBlur  = isLast ? 20 : 7;
      ctx.fillStyle   = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Specular sheen
      const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.35, r * 0.05, x, y, r);
      g.addColorStop(0, 'rgba(255,255,255,0.38)');
      g.addColorStop(0.4, 'rgba(255,255,255,0.06)');
      g.addColorStop(1, 'rgba(0,0,0,0.25)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      // Last-move ring
      if (isLast) {
        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(x, y, r + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Winning line
    if (winLine && winLine.length >= 2) {
      const sorted = [...winLine].sort((a, b) => a.x - b.x || a.y - b.y);
      const fp = g2p(sorted[0].x, sorted[0].y);
      const lp = g2p(sorted[sorted.length - 1].x, sorted[sorted.length - 1].y);
      ctx.strokeStyle = '#e3b341';
      ctx.lineWidth   = 4;
      ctx.lineCap     = 'round';
      ctx.shadowColor = '#e3b341';
      ctx.shadowBlur  = 18;
      ctx.beginPath();
      ctx.moveTo(fp.x, fp.y);
      ctx.lineTo(lp.x, lp.y);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineCap    = 'butt';
    }
  }

  // ── Input ──────────────────────────────────────────────────────────────────
  let dragOrigin  = null;   // { x, y, ox, oy }
  let dragMoved   = false;
  let clickMoved  = false;

  function evPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragOrigin = { x: e.clientX, y: e.clientY, ox: offset.x, oy: offset.y };
    dragMoved  = false;
    clickMoved = false;
  });

  window.addEventListener('mousemove', e => {
    if (dragOrigin) {
      const dx = e.clientX - dragOrigin.x;
      const dy = e.clientY - dragOrigin.y;
      if (!dragMoved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
        dragMoved  = true;
        clickMoved = true;
        canvas.classList.add('panning');
      }
      if (dragMoved) {
        offset.x = dragOrigin.ox + dx;
        offset.y = dragOrigin.oy + dy;
        draw();
        return;
      }
    }
    const p = evPos(e);
    hover = p2g(p.x, p.y);
    draw();
  });

  window.addEventListener('mouseup', e => {
    const wasDrag = clickMoved;
    dragOrigin = null;
    dragMoved  = false;
    clickMoved = false;
    canvas.classList.remove('panning');

    if (!wasDrag && !busy && !winner && current === HUMAN) {
      const p = evPos(e);
      const g = p2g(p.x, p.y);
      if (place(g.x, g.y)) {
        draw();
        renderStatus();
        if (!winner) scheduleBot();
      }
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hover = null;
    if (!dragMoved) draw();
  });

  // Touch
  let touchOrigin = null;
  let touchMoved  = false;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchOrigin = { x: t.clientX, y: t.clientY, ox: offset.x, oy: offset.y };
    touchMoved  = false;
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchOrigin) return;
    const t  = e.touches[0];
    const dx = t.clientX - touchOrigin.x;
    const dy = t.clientY - touchOrigin.y;
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) touchMoved = true;
    if (touchMoved) {
      offset.x = touchOrigin.ox + dx;
      offset.y = touchOrigin.oy + dy;
      draw();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const moved = touchMoved;
    const t     = e.changedTouches[0];
    touchOrigin = null;
    touchMoved  = false;

    if (!moved && !busy && !winner && current === HUMAN) {
      const r = canvas.getBoundingClientRect();
      const g = p2g(t.clientX - r.left, t.clientY - r.top);
      if (place(g.x, g.y)) {
        draw();
        renderStatus();
        if (!winner) scheduleBot();
      }
    }
  }, { passive: false });

  // ── Bot scheduling ─────────────────────────────────────────────────────────
  function scheduleBot() {
    busy = true;
    renderStatus();
    draw();

    // Short delay so the UI can repaint before heavy computation
    const diff  = document.getElementById('difficulty').value;
    const delay = diff === 'expert' ? 80 : 30;

    setTimeout(() => {
      const move = computeAIMove();
      place(move.x, move.y);
      busy = false;
      ensureVisible(move.x, move.y);
      draw();
      renderStatus();
    }, delay);
  }

  // Pan just enough to keep (gx,gy) visible with a margin
  function ensureVisible(gx, gy) {
    const margin = CELL * 5;
    const { x, y } = g2p(gx, gy);
    if (x < margin)     offset.x += margin - x;
    if (x > W - margin) offset.x -= x - (W - margin);
    if (y < margin)     offset.y += margin - y;
    if (y > H - margin) offset.y -= y - (H - margin);
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  const statusEl  = document.getElementById('status');
  const scoreYou  = document.getElementById('s-you');
  const scoreAI   = document.getElementById('s-ai');

  function renderStatus() {
    if (winner === HUMAN) {
      statusEl.textContent = 'You win! 🎉';
      statusEl.className   = 'win';
    } else if (winner === BOT) {
      statusEl.textContent = 'AI wins!';
      statusEl.className   = 'lose';
    } else if (busy) {
      statusEl.textContent = 'Thinking…';
      statusEl.className   = 'ai';
    } else {
      statusEl.textContent = 'Your turn';
      statusEl.className   = 'player';
    }
  }

  function renderScores() {
    scoreYou.textContent = scores.you;
    scoreAI.textContent  = scores.ai;
  }

  document.getElementById('btn-new').addEventListener('click', () => {
    reset();
    offset.x = 0;
    offset.y = 0;
    hover    = null;
    draw();
    renderStatus();
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => { resize(); draw(); });
  resize();
  draw();
  renderStatus();
})();
</script>
</body>
</html>
